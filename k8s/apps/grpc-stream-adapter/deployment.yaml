apiVersion: apps/v1
kind: Deployment
metadata:
  name: grpc-stream-adapter
  namespace: ecg-system
  labels:
    app.kubernetes.io/name: grpc-stream-adapter
    app.kubernetes.io/component: ingestion
    app.kubernetes.io/part-of: ecg-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grpc-stream-adapter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grpc-stream-adapter
        app.kubernetes.io/component: ingestion
        app.kubernetes.io/part-of: ecg-platform
    spec:
      containers:
        - name: grpc-stream-adapter
          image: ecg/grpc-stream-adapter:v2
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 50051
          envFrom:
            - configMapRef:
                name: grpc-stream-adapter-config
          # add later
          # readinessProbe:
          # livenessProbe:
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grpc-direct-receiver
  namespace: ecg-system
  labels:
    app.kubernetes.io/name: grpc-direct-receiver
    app.kubernetes.io/component: ingestion
    app.kubernetes.io/part-of: ecg-platform
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grpc-direct-receiver
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grpc-direct-receiver
        app.kubernetes.io/component: ingestion
        app.kubernetes.io/part-of: ecg-platform
    spec:
      containers:
        - name: grpc-direct-receiver
          image: ecg/grpc-stream-adapter:v2
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 50051
          envFrom:
            - configMapRef:
                name: grpc-direct-receiver-config
            - secretRef:
                name: ecg-storage-consumer-db
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          readinessProbe:
            tcpSocket:
              port: 50051
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 50051
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi