apiVersion: apps/v1
kind: Deployment
metadata:
  name: longpoll-puller
  namespace: ecg-system
  labels:
    app.kubernetes.io/name: longpoll-puller
    app.kubernetes.io/component: ingestion
    app.kubernetes.io/part-of: ecg-platform
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: longpoll-puller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: longpoll-puller
        app.kubernetes.io/component: ingestion
        app.kubernetes.io/part-of: ecg-platform
    spec:
      containers:
        - name: longpoll-puller
          image: ecg/longpoll-puller:v1
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: longpoll-puller-config
            - secretRef:
                name: ecg-storage-consumer-db
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi