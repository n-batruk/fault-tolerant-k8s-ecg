apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecg-storage-consumer
  namespace: ecg-system
  labels:
    app.kubernetes.io/name: ecg-storage-consumer
    app.kubernetes.io/component: storage-consumer
    app.kubernetes.io/part-of: ecg-platform
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ecg-storage-consumer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ecg-storage-consumer
        app.kubernetes.io/component: storage-consumer
        app.kubernetes.io/part-of: ecg-platform
    spec:
      containers:
        - name: ecg-storage-consumer
          image: ecg/ecg-storage-consumer:v1
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: ecg-storage-consumer-config
            - secretRef:
                name: ecg-consumer
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi