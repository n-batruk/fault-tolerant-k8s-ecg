apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: ecg-postgres-pooler-rw
  namespace: database
  labels:
    app.kubernetes.io/name: ecg-postgres-pooler-rw
    app.kubernetes.io/component: database-pooler
    app.kubernetes.io/part-of: ecg-platform
spec:
  cluster:
    name: ecg-postgres
  type: rw
  instances: 2
  pgbouncer:
    poolMode: transaction
    parameters:
      max_client_conn: "100"
      default_pool_size: "20"
      min_pool_size: "5"
      reserve_pool_size: "5"
      reserve_pool_timeout: "5"
      server_idle_timeout: "300"
      client_idle_timeout: "300"