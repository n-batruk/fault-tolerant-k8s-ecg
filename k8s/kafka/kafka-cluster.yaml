apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: ecg-kafka
  namespace: kafka
  labels:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/instance: ecg-kafka
    app.kubernetes.io/part-of: ecg-platform
spec:
  kafka:
    version: 4.2.0
    metadataVersion: 4.2-IV1
    listeners:
      - name: internal
        port: 9093
        type: internal
        tls: true
        authentication:
          type: tls
    metricsConfig:
      type: jmxPrometheusExporter
      valueFrom:
        configMapKeyRef:
          name: ecg-kafka-metrics
          key: kafka-metrics-config.yml
    authorization:
      type: simple
    config:
      # Producer-side: mandatory acks=all for reliability
      default.replication.factor: 3
      min.insync.replicas: 2
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      auto.create.topics.enable: false
      num.partitions: 3
    rack:
      topologyKey: topology.kubernetes.io/zone
  entityOperator:
    topicOperator: {}
    userOperator: {}
  kafkaExporter:
    topicRegex: ".*"
    groupRegex: ".*"
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 300m
        memory: 384Mi
    template:
      pod:
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: node-pool.ecg/name
                      operator: In
                      values:
                        - app