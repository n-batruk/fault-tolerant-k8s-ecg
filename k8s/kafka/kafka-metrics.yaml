apiVersion: v1
kind: ConfigMap
metadata:
  name: ecg-kafka-metrics
  namespace: kafka
  labels:
    app.kubernetes.io/name: kafka-metrics
    app.kubernetes.io/instance: ecg-kafka
    app.kubernetes.io/part-of: ecg-platform
data:
  kafka-metrics-config.yml: |
    lowercaseOutputName: true
    lowercaseOutputLabelNames: true
    rules:
      - pattern: kafka.server<type=(.+), name=(.+), clientId=(.+), topic=(.+), partition=(.*)><>Value
        name: kafka_server_$1_$2
        type: GAUGE
        labels:
          client_id: "$3"
          topic: "$4"
          partition: "$5"

      - pattern: kafka.server<type=(.+), name=(.+), clientId=(.+), brokerHost=(.+), brokerPort=(.+)><>Value
        name: kafka_server_$1_$2
        type: GAUGE
        labels:
          client_id: "$3"
          broker: "$4:$5"

      - pattern: kafka.server<type=(.+), name=(.+), clientId=(.+)><>Value
        name: kafka_server_$1_$2
        type: GAUGE
        labels:
          client_id: "$3"

      - pattern: kafka.server<type=(.+), name=(.+), topic=(.+), partition=(.*)><>Value
        name: kafka_server_$1_$2
        type: GAUGE
        labels:
          topic: "$3"
          partition: "$4"

      - pattern: kafka.server<type=(.+), name=(.+), topic=(.+)><>Value
        name: kafka_server_$1_$2
        type: GAUGE
        labels:
          topic: "$3"

      - pattern: kafka.server<type=(.+), name=(.+)><>Value
        name: kafka_server_$1_$2
        type: GAUGE

      - pattern: kafka.controller<type=(.+), name=(.+)><>Value
        name: kafka_controller_$1_$2
        type: GAUGE

      - pattern: kafka.network<type=(.+), name=(.+), request=(.+)><>Value
        name: kafka_network_$1_$2
        type: GAUGE
        labels:
          request: "$3"

      - pattern: kafka.network<type=(.+), name=(.+)><>Value
        name: kafka_network_$1_$2
        type: GAUGE

      - pattern: kafka.log<type=(.+), name=(.+), topic=(.+), partition=(.+)><>Value
        name: kafka_log_$1_$2
        type: GAUGE
        labels:
          topic: "$3"
          partition: "$4"

      - pattern: kafka.cluster<type=(.+), name=(.+)><>Value
        name: kafka_cluster_$1_$2
        type: GAUGE

      - pattern: kafka.server<type=BrokerTopicMetrics, name=(.+), topic=(.+)><>Count
        name: kafka_server_brokertopicmetrics_$1_total
        type: COUNTER
        labels:
          topic: "$2"

      - pattern: kafka.server<type=BrokerTopicMetrics, name=(.+)><>Count
        name: kafka_server_brokertopicmetrics_$1_total
        type: COUNTER

      - pattern: kafka.network<type=RequestMetrics, name=(.+), request=(.+)><>Count
        name: kafka_network_requestmetrics_$1_total
        type: COUNTER
        labels:
          request: "$2"

      - pattern: kafka.network<type=RequestMetrics, name=(.+), request=(.+)><>Value
        name: kafka_network_requestmetrics_$1
        type: GAUGE
        labels:
          request: "$2"

      - pattern: kafka.(.+)<type=(.+), name=(.+)><>Count
        name: kafka_$1_$2_$3_total
        type: COUNTER

      - pattern: kafka.(.+)<type=(.+), name=(.+)><>Value
        name: kafka_$1_$2_$3
        type: GAUGE