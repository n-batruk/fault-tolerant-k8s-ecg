apiVersion: kafka.strimzi.io/v1
kind: KafkaUser
metadata:
  name: ecg-api
  namespace: kafka
  labels:
    strimzi.io/cluster: ecg-kafka
    app.kubernetes.io/name: kafka
    app.kubernetes.io/instance: ecg-kafka
    app.kubernetes.io/part-of: ecg-platform
spec:
  authentication:
    type: tls

  authorization:
    type: simple
    acls:
      - resource:
          type: topic
          name: ecg.events
          patternType: literal
        operations:
          - Describe
          - Write
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaUser
metadata:
  name: ecg-processor
  namespace: kafka
  labels:
    strimzi.io/cluster: ecg-kafka
    app.kubernetes.io/name: kafka
    app.kubernetes.io/instance: ecg-kafka
    app.kubernetes.io/part-of: ecg-platform
spec:
  authentication:
    type: tls

  authorization:
    type: simple
    acls:
      - resource:
          type: topic
          name: ecg.events
          patternType: literal
        operations:
          - Describe
          - Read
      - resource:
          type: group
          name: ecg-processor
          patternType: literal
        operations:
          - Read
          - Describe