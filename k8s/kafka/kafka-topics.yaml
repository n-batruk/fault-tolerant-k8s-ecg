apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: ecg-events
  namespace: kafka
  labels:
    strimzi.io/cluster: ecg-kafka
    app.kubernetes.io/name: kafka
    app.kubernetes.io/instance: ecg-kafka
    app.kubernetes.io/part-of: ecg-platform
spec:
  topicName: ecg.events
  partitions: 3
  replicas: 3
  config:
    min.insync.replicas: 2
    retention.ms: 86400000
    cleanup.policy: delete