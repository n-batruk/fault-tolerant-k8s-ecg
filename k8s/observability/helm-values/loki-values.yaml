deploymentMode: SingleBinary

loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 1

  storage:
    type: filesystem

  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

  limits_config:
    retention_period: 6h
    ingestion_rate_mb: 4
    ingestion_burst_size_mb: 8
    allow_structured_metadata: true

  compactor:
    retention_enabled: true
    delete_request_store: filesystem

singleBinary:
  replicas: 1

  nodeSelector:
    node-pool.ecg/name: observability

  tolerations:
    - key: dedicated
      operator: Equal
      value: observability
      effect: NoSchedule

  persistence:
    enabled: true
    storageClass: standard
    size: 5Gi

  resources:
    requests:
      cpu: 100m
      memory: 384Mi
    limits:
      cpu: 700m
      memory: 1Gi

gateway:
  enabled: true

  nginxConfig:
    resolver: "10.96.0.10"

  nodeSelector:
    node-pool.ecg/name: observability

  tolerations:
    - key: dedicated
      operator: Equal
      value: observability
      effect: NoSchedule

  resources:
    requests:
      cpu: 30m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

write:
  replicas: 0

read:
  replicas: 0

backend:
  replicas: 0

chunksCache:
  enabled: false

resultsCache:
  enabled: false

test:
  enabled: false

lokiCanary:
  enabled: false