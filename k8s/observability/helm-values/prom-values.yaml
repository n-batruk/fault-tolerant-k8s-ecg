crds:
  enabled: true

defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: false
    configReloaders: true
    general: true
    k8s: true
    kubeApiserverAvailability: true
    kubeApiserverBurnrate: true
    kubeApiserverHistogram: true
    kubeApiserverSlos: true
    kubeControllerManager: true
    kubelet: true
    kubeProxy: true
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    kubeSchedulerAlerting: true
    kubeSchedulerRecording: true
    network: true
    node: true
    nodeExporterAlerting: true
    nodeExporterRecording: true
    prometheus: true
    prometheusOperator: true

prometheusOperator:
  admissionWebhooks:
    enabled: true
    patch:
      enabled: true

  nodeSelector:
    node-pool.ecg/name: observability

  tolerations:
    - key: dedicated
      operator: Equal
      value: observability
      effect: NoSchedule

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 384Mi

prometheus:
  enabled: true

  prometheusSpec:
    replicas: 1
    retention: 6h
    retentionSize: 2GB

    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

    scrapeInterval: 30s
    evaluationInterval: 30s

    nodeSelector:
      node-pool.ecg/name: observability

    tolerations:
      - key: dedicated
        operator: Equal
        value: observability
        effect: NoSchedule

    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: standard
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 5Gi

    resources:
      requests:
        cpu: 150m
        memory: 768Mi
      limits:
        cpu: 800m
        memory: 1536Mi

alertmanager:
  enabled: true

  alertmanagerSpec:
    replicas: 1
    retention: 6h

    nodeSelector:
      node-pool.ecg/name: observability

    tolerations:
      - key: dedicated
        operator: Equal
        value: observability
        effect: NoSchedule

    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: standard
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 1Gi

    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 300m
        memory: 384Mi

  config:
    global:
      resolve_timeout: 5m

    route:
      receiver: "null"
      group_by:
        - namespace
        - alertname
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 2h

    receivers:
      - name: "null"

grafana:
  enabled: true

  adminUser: admin
  adminPassword: admin

  nodeSelector:
    node-pool.ecg/name: observability

  tolerations:
    - key: dedicated
      operator: Equal
      value: observability
      effect: NoSchedule

  persistence:
    enabled: true
    storageClassName: standard
    accessModes:
      - ReadWriteOnce
    size: 1Gi

  resources:
    requests:
      cpu: 50m
      memory: 192Mi
    limits:
      cpu: 400m
      memory: 512Mi

  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL
    datasources:
      enabled: true
      searchNamespace: ALL

  additionalDataSources:
    - name: Loki
      type: loki
      access: proxy
      url: http://loki-gateway.observability.svc.cluster.local
      isDefault: false

kubeStateMetrics:
  enabled: true

kube-state-metrics:
  nodeSelector:
    node-pool.ecg/name: observability

  tolerations:
    - key: dedicated
      operator: Equal
      value: observability
      effect: NoSchedule

  resources:
    requests:
      cpu: 30m
      memory: 96Mi
    limits:
      cpu: 200m
      memory: 256Mi

nodeExporter:
  enabled: true

prometheus-node-exporter:
  tolerations:
    - operator: Exists

  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 150m
      memory: 128Mi