syntax = "proto3";

package ecg.v1;

message EcgChunk {
  string schema_version = 1;

  string source_id = 2;
  string session_id = 3;

  int64 sequence_from = 4;
  int64 sequence_to = 5;

  string timestamp_from = 6;
  string timestamp_to = 7;

  int32 sampling_rate = 8;
  string lead_id = 9;

  repeated double samples = 10;
}

message EcgAck {
  string session_id = 1;

  int64 sequence_from = 2;
  int64 sequence_to = 3;

  bool accepted = 4;
  string message = 5;
}

service EcgIngestion {
  rpc StreamChunks(stream EcgChunk) returns (stream EcgAck);
}